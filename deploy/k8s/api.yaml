apiVersion: apps/v1
kind: Deployment
metadata:
  name: skills-hub-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skills-hub-api
  template:
    metadata:
      labels:
        app: skills-hub-api
    spec:
      initContainers:
        - name: migrate
          image: skills-hub-api:latest
          imagePullPolicy: IfNotPresent
          command: ["dotnet", "SkillsHub.Api.dll", "--migrate"]
          envFrom:
            - secretRef:
                name: skills-hub-api-secret
            - configMapRef:
                name: skills-hub-api-config
      containers:
        - name: api
          image: skills-hub-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: skills-hub-api-secret
            - configMapRef:
                name: skills-hub-api-config
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: skills-hub-api
spec:
  selector:
    app: skills-hub-api
  ports:
    - port: 8080
      targetPort: 8080
