apiVersion: v1
kind: ConfigMap
metadata:
  name: skills-hub-api-config
data:
  NODE_ENV: "production"
  ASPNETCORE_URLS: "http://+:8080"
  WEB_ORIGIN: "https://skills-hub.company.local"
  GITLAB_BASE_URL: "https://gitlab.company.local"
  GITLAB_GROUPS: "agent-skills"
  GITLAB_SYNC_ENABLED: "true"
  PG_POOL_MAX: "5"
  MAX_PACKAGE_FILES: "200"
  MAX_PACKAGE_BYTES: "26214400"
  GITLAB_REQUEST_TIMEOUT_MS: "10000"
  GITLAB_REQUEST_RETRIES: "2"
  SYNC_LOCK_TTL_SECONDS: "1800"
